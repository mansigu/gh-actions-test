# See 04-using-actions/README.md for more information
# about using actions within workflows.

name: 06 - Using Actions

on: push
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06-using-actions/react-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install Dependencies
        run: npm ci
        working_directory: 06-using-actions
      - name: Run Unit Tests
        run: npm run test